# 核心修正：spring.config.import 语法格式（无多余空格，引号可选）
spring:
  config:
    import:
      - classpath:application.yml # 关键：classpath:后不能加空格
  application:
    name: aimin-auth
  cloud:
    nacos:
      discovery:
        enabled: true
        namespace: ba2e7f3d-23a3-4bf1-a8f5-6a5dfce1c259
      server-addr: 127.0.0.1:8848

# 服务器配置（小写server，缩进2个空格）
server:
  port: 8081 # 端口改为8081，避免8080占用
  servlet:
    context-path: /aimin-auth

# 微信配置
wx:
  appId: wxea03af2f9d0dd8e9
  appSecret: f87869cae4f6582e36c5fd6079fbbec8

# Sa-Token配置
sa-token:
  token-name: aimin-auth-token
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true